<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지점 데이터 관리</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css" />
  <style>
    body { background: #f8f9fa; }
    .admin-card { max-width: 680px; margin: 40px auto; }
    .status-badge { font-size: 0.85rem; }
    #mapping-section { display: none; }
    .field-label { font-weight: 500; font-size: 0.9rem; }
    #result-msg { font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="admin-card px-3">

  <div class="d-flex align-items-center justify-content-between py-3 border-bottom mb-3">
    <h5 class="mb-0 fw-bold">지점 데이터 관리</h5>
    <a href="/" class="btn btn-sm btn-outline-secondary">← 지도로</a>
  </div>

  <!-- 현재 상태 -->
  <div class="alert alert-light border mb-3 py-2" id="status-box">
    <span id="status-text">불러오는 중...</span>
  </div>

  <!-- 소스 탭 -->
  <ul class="nav nav-tabs mb-3" id="sourceTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-gsheet" data-bs-toggle="tab"
              data-bs-target="#pane-gsheet" type="button" role="tab">구글 시트</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-xlsx" data-bs-toggle="tab"
              data-bs-target="#pane-xlsx" type="button" role="tab">엑셀 파일</button>
    </li>
  </ul>

  <div class="tab-content mb-3">

    <!-- 구글 시트 탭 -->
    <div class="tab-pane fade show active" id="pane-gsheet" role="tabpanel">
      <div class="input-group">
        <input type="url" id="gsheet-url" class="form-control"
               placeholder="https://docs.google.com/spreadsheets/d/...">
        <button class="btn btn-outline-primary" id="btn-preview-gsheet" type="button">
          헤더 확인
        </button>
      </div>
      <div class="form-text">공개(링크 공유) 상태의 시트 URL을 붙여넣으세요.</div>
    </div>

    <!-- 엑셀 탭 -->
    <div class="tab-pane fade" id="pane-xlsx" role="tabpanel">
      <div class="input-group">
        <input type="file" id="xlsx-file" class="form-control" accept=".xlsx">
        <button class="btn btn-outline-primary" id="btn-preview-xlsx" type="button">
          헤더 확인
        </button>
      </div>
      <div class="form-text">.xlsx 파일을 선택하세요 (첫 번째 시트를 사용합니다).</div>
    </div>

  </div>

  <!-- 컬럼 매핑 (헤더 확인 후 표시) -->
  <div id="mapping-section">
    <div class="card mb-3">
      <div class="card-header py-2 fw-semibold" style="font-size:0.9rem;">
        컬럼 매핑
        <span class="text-muted fw-normal ms-2" id="preview-info" style="font-size:0.8rem;"></span>
      </div>
      <div class="card-body pb-2">
        <div class="row g-2">
          <div class="col-6">
            <label class="field-label mb-1">ID / 순번</label>
            <select class="form-select form-select-sm" id="map-id"></select>
          </div>
          <div class="col-6">
            <label class="field-label mb-1">지점명</label>
            <select class="form-select form-select-sm" id="map-name"></select>
          </div>
          <div class="col-6">
            <label class="field-label mb-1">시군구</label>
            <select class="form-select form-select-sm" id="map-sigungu"></select>
          </div>
          <div class="col-6">
            <label class="field-label mb-1">세부주소</label>
            <select class="form-select form-select-sm" id="map-address"></select>
          </div>
          <div class="col-6">
            <label class="field-label mb-1">위도 (Latitude)</label>
            <select class="form-select form-select-sm" id="map-lat"></select>
          </div>
          <div class="col-6">
            <label class="field-label mb-1">경도 (Longitude)</label>
            <select class="form-select form-select-sm" id="map-lng"></select>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-primary" id="btn-import" type="button">
        가져오기 및 저장
      </button>
    </div>
  </div>

  <!-- 결과 메시지 -->
  <div id="result-msg"></div>

</div>

<script src="/static/vendor/bootstrap.bundle.min.js"></script>
<script src="/static/js/admin.js"></script>
</body>
</html>
