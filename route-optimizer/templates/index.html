<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전파조사 경로 최적화</title>

  <!-- Bootstrap 5 (로컬) -->
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css" />

  <!-- Leaflet (로컬) -->
  <link rel="stylesheet" href="/static/vendor/leaflet.css" />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── 데스크톱: 2열 레이아웃 ── -->
<div id="app-desktop" class="d-none d-md-flex vh-100">

  <!-- 사이드바 -->
  <div id="sidebar" class="d-flex flex-column border-end bg-light">
    <div class="sidebar-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
      <h6 class="mb-0 fw-bold">전파조사 경로 최적화</h6>
      <a href="/admin" class="btn btn-outline-secondary btn-sm py-0 px-2" style="font-size:0.75rem;">
        &#128229; Import
      </a>
    </div>

    <!-- 설정 영역 -->
    <div class="px-3 py-2 border-bottom">
      <div class="row g-2 align-items-center mb-2">
        <div class="col-6">
          <label class="form-label small mb-1">시작시각</label>
          <input type="time" id="start-time" class="form-control form-control-sm" value="09:00" />
        </div>
        <div class="col-6">
          <label class="form-label small mb-1">체류(분)</label>
          <input type="number" id="stay-minutes" class="form-control form-control-sm"
            value="20" min="1" max="120" />
        </div>
      </div>

      <!-- 출발지/도착지 표시 -->
      <div class="small text-muted mb-1 d-flex align-items-center gap-1">
        <span id="label-origin" class="flex-grow-1">출발지: 미지정</span>
        <button id="btn-clear-origin" class="btn btn-link btn-sm p-0 d-none">✕</button>
      </div>
      <div class="small text-muted mb-2 d-flex align-items-center gap-1">
        <span id="label-destination" class="flex-grow-1">도착지: 미지정</span>
        <button id="btn-clear-dest" class="btn btn-link btn-sm p-0 d-none">✕</button>
      </div>

      <!-- 시군구 필터 ("전체" 배지는 JS에서 주입) -->
      <div id="sigungu-filters" class="d-flex flex-wrap gap-1 mb-2"></div>

      <!-- 검색 (왼쪽 체크박스 = 전체선택 토글) -->
      <div class="d-flex gap-2 align-items-center">
        <input type="checkbox" id="cb-select-all" class="form-check-input flex-shrink-0 mt-0"
          title="보이는 장소 전체선택/해제" style="width:1.1em;height:1.1em;cursor:pointer;" />
        <input type="search" id="location-search" class="form-control form-control-sm flex-grow-1"
          placeholder="지점명·주소 검색" />
      </div>
    </div>

    <!-- 지점 목록 -->
    <div id="location-list" class="flex-grow-1 overflow-auto px-2 py-1"></div>

    <!-- 하단 최적화 버튼 -->
    <div class="px-3 py-2 border-top">
      <div class="small text-muted mb-1">
        <span id="selection-summary">선택: 0개</span>
      </div>
      <div class="d-flex gap-2 mb-2">
        <button id="btn-optimize" class="btn btn-primary flex-grow-1" disabled>
          🔄 최적화
        </button>
        <button id="btn-reset" class="btn btn-outline-secondary flex-grow-1" title="초기화">
          초기화
        </button>
      </div>
      <button id="btn-multiday" class="btn btn-outline-primary w-100" disabled title="N일 경로 계획">
        📅 N일 계획
      </button>
    </div>
  </div>

  <!-- 지도 -->
  <div id="map" class="flex-grow-1" style="position:relative;">
    <button id="btn-gps" class="map-gps-btn" title="현재 위치를 출발지로">📍</button>
    <button id="btn-box-select" class="map-gps-btn map-box-select-btn" title="영역 선택 (드래그)">
      <span class="box-sel-icon"></span>
    </button>
  </div>
</div>

<!-- ── 모바일: 탭 레이아웃 ── -->
<div id="app-mobile" class="d-flex d-md-none flex-column vh-100">

  <!-- 탭 헤더 -->
  <div class="d-flex align-items-stretch border-bottom">
    <ul class="nav nav-tabs nav-fill flex-grow-1 border-0" id="mobile-tabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="tab-list-btn" data-bs-toggle="tab"
          data-bs-target="#tab-list" type="button" role="tab">목록</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-map-btn" data-bs-toggle="tab"
          data-bs-target="#tab-map" type="button" role="tab">지도</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-result-btn" data-bs-toggle="tab"
          data-bs-target="#tab-result" type="button" role="tab">경로</button>
      </li>
    </ul>
    <a href="/admin" class="btn btn-outline-secondary btn-sm rounded-0 border-0 border-start px-2"
       style="font-size:0.75rem; white-space:nowrap;">&#128229; Import</a>
  </div>

  <!-- 탭 콘텐츠 -->
  <div class="tab-content flex-grow-1 overflow-hidden">

    <!-- 목록 탭 -->
    <div class="tab-pane fade show active h-100 d-flex flex-column" id="tab-list" role="tabpanel">
      <div class="px-3 py-2 border-bottom">
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label small mb-1">시작시각</label>
            <input type="time" id="start-time-m" class="form-control form-control-sm" value="09:00" />
          </div>
          <div class="col-6">
            <label class="form-label small mb-1">체류(분)</label>
            <input type="number" id="stay-minutes-m" class="form-control form-control-sm"
              value="20" min="1" max="120" />
          </div>
        </div>
        <div class="small text-muted mb-1 d-flex align-items-center gap-1">
          <span id="label-origin-m" class="flex-grow-1">출발지: 미지정</span>
          <button id="btn-clear-origin-m" class="btn btn-link btn-sm p-0 d-none">✕</button>
        </div>
        <div class="small text-muted mb-2 d-flex align-items-center gap-1">
          <span id="label-destination-m" class="flex-grow-1">도착지: 미지정</span>
          <button id="btn-clear-dest-m" class="btn btn-link btn-sm p-0 d-none">✕</button>
        </div>
        <!-- 시군구 필터 ("전체" 배지는 JS에서 주입) -->
        <div id="sigungu-filters-m" class="d-flex flex-wrap gap-1 mb-2"></div>

        <!-- 검색 (왼쪽 체크박스 = 전체선택 토글) -->
        <div class="d-flex gap-2 align-items-center">
          <input type="checkbox" id="cb-select-all-m" class="form-check-input flex-shrink-0 mt-0"
            title="보이는 장소 전체선택/해제" style="width:1.1em;height:1.1em;cursor:pointer;" />
          <input type="search" id="location-search-m" class="form-control form-control-sm flex-grow-1"
            placeholder="지점명·주소 검색" />
        </div>
      </div>
      <div id="location-list-m" class="flex-grow-1 overflow-auto px-2 py-1"></div>
      <div class="px-3 py-2 border-top action-bar">
        <div class="small text-muted mb-1"><span id="selection-summary-m">선택: 0개</span></div>
        <div class="d-flex gap-2 mb-1">
          <button id="btn-optimize-m" class="btn btn-primary flex-grow-1" disabled>🔄 최적화</button>
          <button id="btn-reset-m" class="btn btn-outline-secondary flex-grow-1" title="초기화">초기화</button>
        </div>
        <button id="btn-multiday-m" class="btn btn-outline-primary w-100" disabled title="N일 경로 계획">
          📅 N일 계획
        </button>
      </div>
    </div>

    <!-- 지도 탭 -->
    <div class="tab-pane fade h-100" id="tab-map" role="tabpanel" style="position:relative;">
      <div id="map-mobile" class="h-100"></div>
      <button id="btn-gps-m" class="map-gps-btn" title="현재 위치를 출발지로">📍</button>
      <button id="btn-box-select-m" class="map-gps-btn map-box-select-btn" title="영역 선택 (드래그)">
        <span class="box-sel-icon"></span>
      </button>
    </div>

    <!-- 경로 탭 -->
    <div class="tab-pane fade h-100 overflow-auto p-2" id="tab-result" role="tabpanel">
      <div id="result-panel-m">
        <p class="text-muted small text-center mt-4">최적화 후 결과가 표시됩니다.</p>
      </div>
    </div>
  </div>
</div>

<!-- 결과 패널 (데스크톱용 오른쪽 패널 — 지도 위에 오버레이) -->
<div id="result-panel" class="d-none"></div>

<!-- N일 계획 결과 패널 (데스크톱: 지도 위 오버레이) -->
<div id="multiday-result-panel" class="d-none"></div>

<!-- N일 계획 칸반 패널 (전체화면 오버레이) -->
<div id="nday-panel" class="d-none">
  <!-- 헤더 -->
  <div class="nday-header">
    <strong class="nday-title">📅 N일 경로 계획</strong>
    <div class="nday-common-settings">
      <label class="nday-setting-label">업무시작
        <input type="time" id="nday-work-start" class="form-control form-control-sm nday-time-input" value="09:00" />
      </label>
      <label class="nday-setting-label">체류(분)
        <input type="number" id="nday-stay-minutes" class="form-control form-control-sm nday-stay-input"
          value="20" min="1" max="120" />
      </label>
    </div>
    <div class="nday-header-actions">
      <button id="nday-add-group-btn" class="btn btn-outline-primary btn-sm">+ 그룹 추가</button>
      <button id="nday-optimize-all-btn" class="btn btn-warning btn-sm" disabled>⚡ 전체 최적화</button>
      <button id="nday-done-btn" class="btn btn-success btn-sm" disabled>완료</button>
      <button id="nday-close-btn" class="btn btn-outline-secondary btn-sm">✕ 닫기</button>
    </div>
  </div>
  <!-- 바디: 가로 스크롤 칸반 -->
  <div class="nday-body">
    <!-- 왼쪽: 미배정 열 -->
    <div class="nday-left-col">
      <div class="nday-col-header">미배정 <span id="nday-unassigned-count" class="badge bg-secondary">0</span></div>
      <div id="nday-sgg-bar" class="nday-sgg-bar"></div>
      <div id="nday-unassigned-zone" class="nday-drop-zone"></div>
    </div>
    <!-- 구분선 -->
    <div class="nday-divider"></div>
    <!-- 그룹 열들 (동적 생성) -->
    <div id="nday-groups-container" class="nday-groups-container"></div>
  </div>
</div>
<!-- 지도 클릭 좌표 선택 인디케이터 (패널 밖 — 반투명 시에도 보임) -->
<div id="nday-map-pick-indicator" class="nday-map-pick-indicator d-none">
  <span>지도를 클릭해 위치를 선택하세요</span>
  <button id="nday-map-pick-cancel" class="btn btn-sm btn-outline-light ms-2">취소</button>
</div>
<!-- 반투명 모드: 패널로 돌아가기 버튼 (패널 밖 — 항상 클릭 가능) -->
<button id="nday-map-back-btn" class="nday-map-back-btn d-none">← 패널로 돌아가기</button>

<!-- 컨텍스트 메뉴 -->
<div id="ctx-menu" class="ctx-menu d-none">
  <ul class="list-unstyled mb-0">
    <li><button id="ctx-set-origin" class="ctx-menu-item">📍 여기서 출발</button></li>
    <li><button id="ctx-set-dest" class="ctx-menu-item">🏁 여기서 종료</button></li>
  </ul>
</div>

<!-- 로딩 오버레이 -->
<div id="loading-overlay" class="d-none">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">최적화 중...</span>
  </div>
</div>

<!-- window.LOCATIONS 인라인 주입 -->
<script>
  window.LOCATIONS = {{ locations_json | safe }};
</script>

<!-- Bootstrap 5 JS (로컬) -->
<script src="/static/vendor/bootstrap.bundle.min.js"></script>

<!-- Leaflet (로컬) -->
<script src="/static/vendor/leaflet.js"></script>

<!-- App JS modules -->
<script type="module" src="/static/js/app.js"></script>

</body>
</html>
